"Skema untuk tipe data Schedule"
type Schedule {
    id: ID!
    route: String!
    departure_time: String!
    facilities: String!
    price: Float!
}

"Root query GraphQL"
type Query {
    "Mengambil semua daftar rute dan jadwal"
    schedules: [Schedule!]! @all

    "Mengambil detail informasi satu jadwal berdasarkan ID"
    schedule(id: ID! @eq): Schedule @find
}